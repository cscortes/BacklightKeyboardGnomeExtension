# Verify / pack the extension as far as CI can without a real GNOME Shell session
# or keyboard hardware. Runs the same local validate path (lint, gjs syntax,
# schedule unit tests, prefs Gtk/Adw smoke), then packaging + hygiene checks.
#
# Host is ubuntu-latest (GitHub-hosted); the job runs inside a Fedora 44 container
# so Gtk/Adw match development (PreferencesPage.set_banner needs libadwaita ≥ 1.7;
# Ubuntu 24.04 ships an older Adw and fails the prefs smoke test).
name: Verify extension

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · test · pack
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    env:
      # Prefs smoke uses Gio.Settings without a full desktop session.
      GSETTINGS_BACKEND: memory
      # Headless GTK: no accessibility bus on CI.
      GTK_A11Y: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          dnf -y install --setopt=install_weak_deps=False \
            gjs \
            gtk4 \
            libadwaita \
            glib2 \
            xorg-x11-server-Xvfb \
            zip \
            unzip \
            dbus-daemon \
            nodejs \
            npm \
            git \
            python3 \
            which \
            findutils \
            gawk
          gjs --version
          rpm -q libadwaita gtk4 gjs

      - name: Install npm dependencies
        run: npm ci --no-fund --no-audit

      - name: Validate (ESLint, gjs syntax, schedule tests, prefs smoke)
        run: xvfb-run -a dbus-run-session -- ./validate-js.sh

      - name: Packaging + metadata + hygiene
        run: |
          chmod +x tools/ci-verify.sh
          ./tools/ci-verify.sh

      - name: Upload packed extension
        uses: actions/upload-artifact@v4
        with:
          name: kbd-backlight-scheduler-shell-extension
          path: dist/*.shell-extension.zip
          if-no-files-found: error
